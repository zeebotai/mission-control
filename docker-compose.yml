services:
  api:
    build: ./backend
    ports:
      - "8020:8000"
    environment:
      - DATABASE_URL=sqlite:////data/mission_control.db
      - CLAWDBOT_CRON_DIR=/clawdbot_cron
    volumes:
      - mc_data:/data
      # Read Clawdbot cron jobs/runs directly from the host (read-only)
      - ~/.clawdbot/cron:/clawdbot_cron:ro
      # Memory files (read-only)
      - ../memory:/mc_memory:ro
      - ../MEMORY.md:/mc_MEMORY.md:ro

  web:
    build: ./frontend
    environment:
      # Use same-origin proxy in the browser; Next server rewrites /api/* -> INTERNAL_API_BASE.
      - NEXT_PUBLIC_API_BASE=/api
      - INTERNAL_API_BASE=http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mc_data:
