services:
  api:
    build: ./backend
    ports:
      - "8020:8000"
    environment:
      - DATABASE_URL=sqlite:////data/mission_control.db
    volumes:
      - mc_data:/data

  web:
    build: ./frontend
    environment:
      # Use same-origin proxy in the browser; Next server rewrites /api/* -> INTERNAL_API_BASE.
      - NEXT_PUBLIC_API_BASE=/api
      - INTERNAL_API_BASE=http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mc_data:
